<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" stroke="url(#grad)" stroke-width="3" fill="none"/>
  <!-- Inner hexagon shape representing multi-agent orchestration -->
  <polygon points="32,12 48,22 48,42 32,52 16,42 16,22" stroke="url(#grad)" stroke-width="2" fill="none"/>
  <!-- Central node -->
  <circle cx="32" cy="32" r="5" fill="url(#grad)"/>
  <!-- Connection lines to vertices -->
  <line x1="32" y1="27" x2="32" y2="12" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="30" x2="48" y2="22" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="34" x2="48" y2="42" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="37" x2="32" y2="52" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="34" x2="16" y2="42" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="30" x2="16" y2="22" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <!-- Vertex nodes -->
  <circle cx="32" cy="12" r="3" fill="#a78bfa"/>
  <circle cx="48" cy="22" r="3" fill="#a78bfa"/>
  <circle cx="48" cy="42" r="3" fill="#a78bfa"/>
  <circle cx="32" cy="52" r="3" fill="#a78bfa"/>
  <circle cx="16" cy="42" r="3" fill="#a78bfa"/>
  <circle cx="16" cy="22" r="3" fill="#a78bfa"/>
</svg>
